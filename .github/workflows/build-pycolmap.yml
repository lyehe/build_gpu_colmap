name: Build pycolmap Wheels

on:
  workflow_call:
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      cuda:
        description: 'Build with CUDA'
        type: boolean
        default: true
      python_version:
        description: 'Python version (leave empty for all)'
        type: string
        default: ''

jobs:
  build-wheels:
    name: py${{ matrix.python-version }} ${{ matrix.os }} ${{ matrix.cuda && matrix.bundle_cuda && format('CUDA{0}-bundled', matrix.cuda_version) || matrix.cuda && matrix.cudss && format('CUDA{0}+cuDSS', matrix.cuda_version) || matrix.cuda && format('CUDA{0}', matrix.cuda_version) || 'CPU' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        cuda: [true, false]
        cudss: [false]  # Default: no cuDSS
        bundle_cuda: [false]  # Default: don't bundle CUDA runtime libs
        cuda_version: ['12.8.1']
        include:
          # cuDSS variants (Windows only)
          - os: windows-latest
            python-version: '3.10'
            cuda: true
            cudss: true
            bundle_cuda: false
            cuda_version: '12.8.1'
          - os: windows-latest
            python-version: '3.11'
            cuda: true
            cudss: true
            bundle_cuda: false
            cuda_version: '12.8.1'
          - os: windows-latest
            python-version: '3.12'
            cuda: true
            cudss: true
            bundle_cuda: false
            cuda_version: '12.8.1'
          - os: windows-latest
            python-version: '3.13'
            cuda: true
            cudss: true
            bundle_cuda: false
            cuda_version: '12.8.1'
          - os: windows-latest
            python-version: '3.14'
            cuda: true
            cudss: true
            bundle_cuda: false
            cuda_version: '12.8.1'
          # NOTE: Windows CUDA 13 removed - CUDA 13 changed DLL names (cusolver64_12 -> cusolver64_13)
          # which breaks delvewheel. Needs upstream COLMAP fix to link against CUDA 13 DLLs.
          # Linux CUDA 13 bundled wheels work fine (self-contained).
          # Self-contained CUDA variants (Linux only) - bundle CUDA runtime libs
          # so users don't need CUDA toolkit installed
          - os: ubuntu-22.04
            python-version: '3.10'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.11'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.12'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.13'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.14'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '12.8.1'
          # CUDA 13.0 self-contained variants (Linux only, bundled)
          # For PyTorch compatibility (torch often pins to .0 releases)
          - os: ubuntu-22.04
            python-version: '3.10'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.11'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.12'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.13'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.14'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.0.2'
          # CUDA 13.1 self-contained variants (Linux only, bundled)
          # Latest CUDA 13 + Blackwell arch 120
          - os: ubuntu-22.04
            python-version: '3.10'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.11'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.12'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.13'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.14'
            cuda: true
            cudss: false
            bundle_cuda: true
            cuda_version: '13.1.0'
          # Self-contained CUDA + cuDSS variants (Linux only, bundled)
          # CUDA 12.8 + cuDSS
          - os: ubuntu-22.04
            python-version: '3.10'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.11'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.12'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.13'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '12.8.1'
          - os: ubuntu-22.04
            python-version: '3.14'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '12.8.1'
          # CUDA 13.0 + cuDSS
          - os: ubuntu-22.04
            python-version: '3.10'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.11'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.12'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.13'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.0.2'
          - os: ubuntu-22.04
            python-version: '3.14'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.0.2'
          # CUDA 13.1 + cuDSS
          - os: ubuntu-22.04
            python-version: '3.10'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.11'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.12'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.13'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.1.0'
          - os: ubuntu-22.04
            python-version: '3.14'
            cuda: true
            cudss: true
            bundle_cuda: true
            cuda_version: '13.1.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch vcpkg history for baseline
        run: git -C third_party/vcpkg fetch --unshallow || true
        shell: bash

      # ==================== Disk Space Cleanup ====================
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unnecessary large packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          # Clean apt cache
          sudo apt-get clean
          echo "Disk space after cleanup:"
          df -h

      # ==================== Python Setup ====================
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel scikit-build-core[pyproject] "pybind11==3.0.1" delvewheel

      # ==================== CUDA Setup ====================
      # CUDA 13.x adds a new "crt" sub-package (contains crt/host_config.h)
      - name: Install CUDA Toolkit (Windows, CUDA 12.x)
        if: matrix.cuda && runner.os == 'Windows' && !startsWith(matrix.cuda_version, '13.')
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ matrix.cuda_version }}
          method: 'network'
          sub-packages: '["nvcc", "nvtx", "cudart", "curand", "curand_dev", "nvrtc", "nvrtc_dev", "nvjitlink", "cublas", "cublas_dev", "cusparse", "cusparse_dev", "cusolver", "cusolver_dev", "cufft", "cufft_dev"]'
          use-github-cache: false
          log-file-suffix: '-windows-py${{ matrix.python-version }}-cuda${{ matrix.cuda_version }}.log'

      - name: Install CUDA Toolkit (Windows, CUDA 13.x)
        if: matrix.cuda && runner.os == 'Windows' && startsWith(matrix.cuda_version, '13.')
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ matrix.cuda_version }}
          method: 'network'
          sub-packages: '["nvcc", "crt", "nvtx", "cudart", "curand", "curand_dev", "nvrtc", "nvrtc_dev", "nvjitlink", "nvvm", "cublas", "cublas_dev", "cusparse", "cusparse_dev", "cusolver", "cusolver_dev", "cufft", "cufft_dev"]'
          use-github-cache: false
          log-file-suffix: '-windows-py${{ matrix.python-version }}-cuda${{ matrix.cuda_version }}.log'

      - name: Install CUDA Toolkit (Linux)
        if: matrix.cuda && runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ matrix.cuda_version }}
          method: 'network'
          linux-local-args: '["--toolkit"]'
          log-file-suffix: '-linux-py${{ matrix.python-version }}-cuda${{ matrix.cuda_version }}.log'

      # ==================== cuDSS Setup ====================
      - name: Install cuDSS (Windows)
        if: matrix.cuda && matrix.cudss && runner.os == 'Windows'
        shell: pwsh
        run: |
          $cudaVersion = "${{ matrix.cuda_version }}"
          $cudaMajor = $cudaVersion.Split('.')[0]

          Write-Host "Downloading cuDSS for CUDA $cudaMajor..."
          $cudssUrl = "https://developer.download.nvidia.com/compute/cudss/redist/libcudss/windows-x86_64/libcudss-windows-x86_64-0.7.1.4_cuda${cudaMajor}-archive.zip"

          Invoke-WebRequest -Uri $cudssUrl -OutFile cudss.zip -UseBasicParsing
          Expand-Archive cudss.zip -DestinationPath "C:/cudss"

          $cudssPath = Get-ChildItem -Path "C:/cudss" -Directory | Select-Object -First 1
          Write-Host "cuDSS installed at: $($cudssPath.FullName)"
          echo "CUDSS_ROOT=$($cudssPath.FullName)" >> $env:GITHUB_ENV

          # Find cudss_DIR (CMake config location)
          $cudssDir = "$($cudssPath.FullName)/lib/$cudaMajor/cmake/cudss"
          if (-not (Test-Path $cudssDir)) {
            $cudssDir = "$($cudssPath.FullName)/lib/cmake/cudss"
          }
          Write-Host "cudss_DIR: $cudssDir"
          echo "cudss_DIR=$cudssDir" >> $env:GITHUB_ENV

      - name: Install cuDSS (Linux)
        if: matrix.cuda && matrix.cudss && runner.os == 'Linux'
        run: |
          CUDA_VERSION="${{ matrix.cuda_version }}"
          CUDA_MAJOR="${CUDA_VERSION%%.*}"

          echo "Downloading cuDSS for CUDA $CUDA_MAJOR..."
          CUDSS_URL="https://developer.download.nvidia.com/compute/cudss/redist/libcudss/linux-x86_64/libcudss-linux-x86_64-0.7.1.4_cuda${CUDA_MAJOR}-archive.tar.xz"

          wget -nv "$CUDSS_URL" -O cudss.tar.xz
          sudo mkdir -p /opt/nvidia/cudss
          sudo tar -xf cudss.tar.xz -C /opt/nvidia/cudss --strip-components=1

          echo "cuDSS installed at: /opt/nvidia/cudss"
          echo "CUDSS_ROOT=/opt/nvidia/cudss" >> $GITHUB_ENV

          # Find cudss_DIR (CMake config location)
          if [ -d "/opt/nvidia/cudss/lib/$CUDA_MAJOR/cmake/cudss" ]; then
            CUDSS_DIR="/opt/nvidia/cudss/lib/$CUDA_MAJOR/cmake/cudss"
          else
            CUDSS_DIR="/opt/nvidia/cudss/lib/cmake/cudss"
          fi
          echo "cudss_DIR: $CUDSS_DIR"
          echo "cudss_DIR=$CUDSS_DIR" >> $GITHUB_ENV

      # ==================== Build Tools ====================
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y

      # Setup MSVC environment so cl.exe is in PATH for CUDA/vcpkg builds
      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl zip unzip tar pkg-config \
            autoconf autoconf-archive automake libtool make \
            ninja-build ccache patchelf \
            libgl-dev libgl1-mesa-dev libglu1-mesa-dev libglew-dev \
            libxmu-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libomp-dev

      # ==================== Compiler Caching ====================
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ccache-pycolmap-${{ matrix.os }}-${{ matrix.cuda && 'cuda' || 'cpu' }}-py${{ matrix.python-version }}
          max-size: 2G

      - name: Configure ccache (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "/usr/lib/ccache" >> $GITHUB_PATH

      # ==================== vcpkg Setup ====================
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/third_party/vcpkg'
          vcpkgJsonGlob: 'vcpkg.json'
        env:
          VCPKG_BINARY_SOURCES: 'clear;default,readwrite'

      # ==================== Build COLMAP-for-pycolmap ====================
      - name: Build COLMAP-for-pycolmap (Windows)
        if: runner.os == 'Windows'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 180
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: |
            $cudaFlag = if ("${{ matrix.cuda }}" -eq "true") { "ON" } else { "OFF" }
            $cudssFlag = if ("${{ matrix.cudss }}" -eq "true") { "ON" } else { "OFF" }

            Write-Host "Building COLMAP-for-pycolmap with CUDA=$cudaFlag cuDSS=$cudssFlag"

            # Create build directory
            New-Item -ItemType Directory -Force -Path build | Out-Null
            Set-Location build

            # Configure
            $vcpkgToolchain = "${{ github.workspace }}/third_party/vcpkg/scripts/buildsystems/vcpkg.cmake"

            # Build cmake args
            $cmakeArgs = @(
              "-G", "Ninja",
              "-DCMAKE_TOOLCHAIN_FILE=$vcpkgToolchain",
              "-DCMAKE_BUILD_TYPE=Release",
              "-DCUDA_ENABLED=$cudaFlag",
              "-DBUILD_COLMAP=OFF",
              "-DBUILD_COLMAP_FOR_PYCOLMAP=ON"
            )

            # Add cuDSS paths if enabled
            if ("${{ matrix.cudss }}" -eq "true" -and $env:cudss_DIR) {
              Write-Host "Adding cuDSS from: $env:cudss_DIR"
              $cmakeArgs += "-Dcudss_DIR=$env:cudss_DIR"
            }

            cmake .. @cmakeArgs `
              -DBUILD_CERES=ON `
              -DGFLAGS_USE_TARGET_NAMESPACE=ON

            # Build
            cmake --build . --config Release --parallel

      - name: Build COLMAP-for-pycolmap (Linux)
        if: runner.os == 'Linux'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 180
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            CUDA_FLAG="${{ matrix.cuda && 'ON' || 'OFF' }}"
            CUDSS_FLAG="${{ matrix.cudss && 'true' || 'false' }}"

            echo "Building COLMAP-for-pycolmap with CUDA=$CUDA_FLAG cuDSS=$CUDSS_FLAG"

            # Create build directory
            mkdir -p build
            cd build

            # Build cmake args
            CMAKE_ARGS=(
              -G Ninja
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/third_party/vcpkg/scripts/buildsystems/vcpkg.cmake"
              -DCMAKE_BUILD_TYPE=Release
              -DCUDA_ENABLED="$CUDA_FLAG"
              -DBUILD_COLMAP=OFF
              -DBUILD_COLMAP_FOR_PYCOLMAP=ON
              -DBUILD_CERES=ON
            )

            # Add cuDSS paths if enabled
            if [ "$CUDSS_FLAG" = "true" ] && [ -n "$cudss_DIR" ]; then
              echo "Adding cuDSS from: $cudss_DIR"
              CMAKE_ARGS+=(-Dcudss_DIR="$cudss_DIR")
            fi

            # Configure
            cmake .. "${CMAKE_ARGS[@]}" \
              -DGFLAGS_USE_TARGET_NAMESPACE=ON

            # Build
            cmake --build . --config Release --parallel

      # ==================== Build Python Wheel ====================
      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: third_party/colmap-for-pycolmap
        run: |
          # Get paths
          $vcpkgToolchain = "${{ github.workspace }}/third_party/vcpkg/scripts/buildsystems/vcpkg.cmake".Replace('\', '/')
          $vcpkgInstalled = "${{ github.workspace }}/build/vcpkg_installed".Replace('\', '/')
          $colmapInstall = "${{ github.workspace }}/build/install/colmap-for-pycolmap".Replace('\', '/')
          $ceresInstall = "${{ github.workspace }}/build/install/ceres".Replace('\', '/')
          $pybind11Dir = (python -c "import pybind11; print(pybind11.get_cmake_dir())").Replace('\', '/')

          $cmakePrefixPath = "${colmapInstall};${ceresInstall};${pybind11Dir}"

          Write-Host "CMAKE_TOOLCHAIN_FILE: $vcpkgToolchain"
          Write-Host "VCPKG_INSTALLED_DIR: $vcpkgInstalled"
          Write-Host "CMAKE_PREFIX_PATH: $cmakePrefixPath"
          Write-Host "Note: CUDA_ENABLED=OFF for wheel build (uses pre-built CUDA-enabled COLMAP)"

          # Build wheel - CUDA_ENABLED=OFF because we link against pre-built COLMAP
          # The COLMAP library already has CUDA support, wheel doesn't compile CUDA code
          # For CUDA builds: Use Ninja generator with CMAKE_CUDA_COMPILER since VS generator
          # requires CUDA Visual Studio toolset integration which isn't reliably available
          $cudaArgs = @()
          if ("${{ matrix.cuda }}" -eq "true") {
            $cudaCompiler = "$env:CUDA_PATH/bin/nvcc.exe".Replace('\', '/')
            Write-Host "Setting CMAKE_CUDA_COMPILER: $cudaCompiler"
            Write-Host "Using Ninja generator to avoid VS CUDA toolset requirement"
            $cudaArgs = @(
              "--config-settings=cmake.define.CMAKE_CUDA_COMPILER=${cudaCompiler}",
              "--config-settings=cmake.args=-G Ninja"
            )
          }

          python -m pip wheel . --no-deps -w wheelhouse `
            --config-settings="cmake.define.CMAKE_TOOLCHAIN_FILE=${vcpkgToolchain}" `
            --config-settings="cmake.define.VCPKG_INSTALLED_DIR=${vcpkgInstalled}" `
            --config-settings="cmake.define.CMAKE_PREFIX_PATH=${cmakePrefixPath}" `
            --config-settings="cmake.define.VCPKG_TARGET_TRIPLET=x64-windows" `
            --config-settings="cmake.define.CUDA_ENABLED=OFF" `
            @cudaArgs

      - name: Build wheel (Linux)
        if: runner.os == 'Linux'
        working-directory: third_party/colmap-for-pycolmap
        run: |
          # Get paths
          VCPKG_TOOLCHAIN="${{ github.workspace }}/third_party/vcpkg/scripts/buildsystems/vcpkg.cmake"
          VCPKG_INSTALLED="${{ github.workspace }}/build/vcpkg_installed"
          COLMAP_INSTALL="${{ github.workspace }}/build/install/colmap-for-pycolmap"
          CERES_INSTALL="${{ github.workspace }}/build/install/ceres"
          PYBIND11_DIR=$(python -c "import pybind11; print(pybind11.get_cmake_dir())")

          # CMake expects semicolons as list separators (not colons)
          CMAKE_PREFIX_PATH="${COLMAP_INSTALL};${CERES_INSTALL};${PYBIND11_DIR}"

          echo "CMAKE_TOOLCHAIN_FILE: $VCPKG_TOOLCHAIN"
          echo "VCPKG_INSTALLED_DIR: $VCPKG_INSTALLED"
          echo "CMAKE_PREFIX_PATH: $CMAKE_PREFIX_PATH"
          echo "Note: CUDA_ENABLED=OFF for wheel build (uses pre-built CUDA-enabled COLMAP)"

          # Build wheel - CUDA_ENABLED=OFF because we link against pre-built COLMAP
          # The COLMAP library already has CUDA support, wheel doesn't compile CUDA code
          python -m pip wheel . --no-deps -w wheelhouse \
            --config-settings="cmake.define.CMAKE_TOOLCHAIN_FILE=${VCPKG_TOOLCHAIN}" \
            --config-settings="cmake.define.VCPKG_INSTALLED_DIR=${VCPKG_INSTALLED}" \
            --config-settings="cmake.define.CMAKE_PREFIX_PATH=${CMAKE_PREFIX_PATH}" \
            --config-settings="cmake.define.VCPKG_TARGET_TRIPLET=x64-linux" \
            --config-settings="cmake.define.CUDA_ENABLED=OFF"

      # ==================== Repair Wheel ====================
      - name: Repair wheel with delvewheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: third_party/colmap-for-pycolmap
        run: |
          $vcpkgBin = "${{ github.workspace }}/build/vcpkg_installed/x64-windows/bin"
          $colmapBin = "${{ github.workspace }}/build/install/colmap-for-pycolmap/bin"

          # Build list of paths for delvewheel
          $addPaths = @(
            "--add-path", "$vcpkgBin",
            "--add-path", "$colmapBin"
          )

          # Add CUDA bin path for CUDA builds (contains nvjitlink, cudart, etc.)
          if ("${{ matrix.cuda }}" -eq "true" -and $env:CUDA_PATH) {
            $cudaBin = "$env:CUDA_PATH\bin"
            Write-Host "Adding CUDA bin path: $cudaBin"
            $addPaths += @("--add-path", "$cudaBin")
          }

          # Add cuDSS bin path for cuDSS builds
          if ("${{ matrix.cudss }}" -eq "true" -and $env:CUDSS_ROOT) {
            # cuDSS DLLs are in bin/12 or bin/13 subdirectory
            $cudssSearchDirs = @(
              "$env:CUDSS_ROOT\bin\12",
              "$env:CUDSS_ROOT\bin\13",
              "$env:CUDSS_ROOT\bin"
            )
            foreach ($dir in $cudssSearchDirs) {
              if (Test-Path "$dir\cudss*.dll") {
                Write-Host "Adding cuDSS bin path: $dir"
                $addPaths += @("--add-path", "$dir")
                break
              }
            }
          }

          $wheel = Get-ChildItem -Path wheelhouse -Filter "pycolmap-*.whl" | Select-Object -First 1

          if ($wheel) {
            Write-Host "Repairing wheel: $($wheel.Name)"
            Write-Host "Search paths: $($addPaths -join ' ')"
            python -m delvewheel repair -v @addPaths -w wheelhouse $wheel.FullName

            # Remove original wheel, keep repaired one
            # delvewheel creates a new wheel with the same name
          } else {
            Write-Error "No wheel found to repair!"
            exit 1
          }

      - name: Repair wheel with auditwheel (Linux)
        if: runner.os == 'Linux'
        working-directory: third_party/colmap-for-pycolmap
        run: |
          pip install auditwheel patchelf

          WHEEL=$(ls wheelhouse/pycolmap-*.whl | head -n 1)

          if [ -n "$WHEEL" ]; then
            echo "Repairing wheel: $WHEEL"

            # Set library paths for auditwheel - include all dependency locations
            export LD_LIBRARY_PATH="${{ github.workspace }}/build/vcpkg_installed/x64-linux/lib:${{ github.workspace }}/build/install/colmap-for-pycolmap/lib:${{ github.workspace }}/build/install/ceres/lib:$LD_LIBRARY_PATH"

            # Add CUDA library paths if CUDA build
            if [ "${{ matrix.cuda }}" = "true" ]; then
              export LD_LIBRARY_PATH="/usr/local/cuda/lib64:$LD_LIBRARY_PATH"
            fi

            # Add cuDSS library paths if cuDSS build
            if [ "${{ matrix.cudss }}" = "true" ] && [ -n "$CUDSS_ROOT" ]; then
              for dir in "$CUDSS_ROOT/lib/12" "$CUDSS_ROOT/lib64/12" "$CUDSS_ROOT/lib" "$CUDSS_ROOT/lib64"; do
                if [ -d "$dir" ]; then
                  echo "Adding cuDSS lib path: $dir"
                  export LD_LIBRARY_PATH="$dir:$LD_LIBRARY_PATH"
                  break
                fi
              done
            fi

            echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"

            # Show wheel info first
            auditwheel show "$WHEEL" || true

            # Build CUDA library exclusion list for auditwheel.
            EXCLUDE_ARGS=""
            if [ "${{ matrix.cuda }}" = "true" ]; then
              if [ "${{ matrix.bundle_cuda }}" = "true" ]; then
                # Self-contained build: only exclude the driver library (must match kernel)
                EXCLUDE_ARGS="--exclude libcuda.so.1"
              else
                # Lightweight build: exclude all CUDA toolkit libraries (user provides these)
                EXCLUDE_ARGS="
                  --exclude libcuda.so.1
                  --exclude libcudart.so.11.0
                  --exclude libcudart.so.12
                  --exclude libcublas.so.11
                  --exclude libcublas.so.12
                  --exclude libcublasLt.so.11
                  --exclude libcublasLt.so.12
                  --exclude libcufft.so.10
                  --exclude libcufft.so.11
                  --exclude libcufftw.so.10
                  --exclude libcufftw.so.11
                  --exclude libcurand.so.10
                  --exclude libcusolver.so.11
                  --exclude libcusolverMg.so.11
                  --exclude libcusparse.so.11
                  --exclude libcusparse.so.12
                  --exclude libnvJitLink.so.12
                  --exclude libnvrtc.so.11.2
                  --exclude libnvrtc.so.12
                  --exclude libcudnn.so.8
                  --exclude libcudnn.so.9
                  --exclude libnccl.so.2
                  --exclude libnvToolsExt.so.1
                  --exclude libcudss.so.0
                "
              fi
            fi

            # Determine the minimum manylinux platform tag.
            # Ubuntu 22.04 has glibc 2.35, so manylinux_2_35 is the baseline.
            # Try progressively older tags in case the toolchain allows it.
            REPAIRED=false
            for PLAT in manylinux_2_35_x86_64 manylinux_2_31_x86_64; do
              echo "Attempting auditwheel repair with --plat $PLAT..."
              if auditwheel repair "$WHEEL" -w wheelhouse --plat "$PLAT" $EXCLUDE_ARGS; then
                echo "Created $PLAT wheel"
                REPAIRED=true
                # Remove original unrepaired wheel to avoid confusion
                rm -f "$WHEEL"
                break
              fi
            done

            if [ "$REPAIRED" = false ]; then
              echo "ERROR: auditwheel repair failed for all platform targets"
              echo "The wheel will not have bundled shared libraries and will fail on user systems."
              exit 1
            fi

            # Post-process: inject ONNX Runtime CUDA provider libraries into the wheel.
            # auditwheel doesn't bundle these because onnxruntime loads them via dlopen(),
            # not via DT_NEEDED. Without them, ALIKED/LightGlue CUDA inference fails.
            if [ "${{ matrix.cuda }}" = "true" ]; then
              COLMAP_LIB="${{ github.workspace }}/build/install/colmap-for-pycolmap/lib"
              REPAIRED_WHEEL=$(ls -t wheelhouse/pycolmap-*manylinux*.whl 2>/dev/null | head -n 1)

              if [ -n "$REPAIRED_WHEEL" ] && [ -f "$COLMAP_LIB/libonnxruntime_providers_shared.so" ]; then
                echo "Injecting ONNX Runtime CUDA providers into wheel..."
                pip install wheel

                TMPDIR=$(mktemp -d)
                python -m wheel unpack "$REPAIRED_WHEEL" -d "$TMPDIR"
                WHEEL_DIR=$(ls -d "$TMPDIR"/pycolmap-*)

                # Find the .libs directory created by auditwheel
                LIBS_DIR=$(find "$WHEEL_DIR" -name "*.libs" -type d | head -1)
                if [ -z "$LIBS_DIR" ]; then
                  LIBS_DIR="$WHEEL_DIR/pycolmap.libs"
                  mkdir -p "$LIBS_DIR"
                fi

                # Copy provider libraries with their original names (onnxruntime dlopen expects these exact names)
                cp "$COLMAP_LIB/libonnxruntime_providers_shared.so" "$LIBS_DIR/"
                cp "$COLMAP_LIB/libonnxruntime_providers_cuda.so" "$LIBS_DIR/"

                # Create symlink so providers can find libonnxruntime.so.1 (auditwheel renamed it)
                RENAMED_ORT=$(ls "$LIBS_DIR"/libonnxruntime-*.so.* 2>/dev/null | head -1)
                if [ -n "$RENAMED_ORT" ]; then
                  ln -sf "$(basename "$RENAMED_ORT")" "$LIBS_DIR/libonnxruntime.so.1"
                fi

                # Set RPATH on providers to find libs in the same directory
                patchelf --set-rpath '$ORIGIN' "$LIBS_DIR/libonnxruntime_providers_shared.so"
                patchelf --set-rpath '$ORIGIN' "$LIBS_DIR/libonnxruntime_providers_cuda.so"

                # Repack wheel
                rm -f "$REPAIRED_WHEEL"
                python -m wheel pack "$WHEEL_DIR" -d wheelhouse
                rm -rf "$TMPDIR"

                echo "ONNX Runtime CUDA providers injected successfully"
                ls -la "$LIBS_DIR"/libonnx* "$LIBS_DIR"/libonnxruntime.so.1 2>/dev/null || true
              else
                echo "WARNING: ONNX provider libraries not found, skipping injection"
              fi
            fi

            # List final wheels
            echo "Wheels in wheelhouse:"
            ls -la wheelhouse/*.whl
          else
            echo "ERROR: No wheel found to repair!"
            exit 1
          fi

      # ==================== Smoke Test ====================
      - name: Smoke test pycolmap wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: third_party/colmap-for-pycolmap
        run: |
          $wheel = Get-ChildItem -Path wheelhouse -Filter "pycolmap-*.whl" | Select-Object -First 1

          if (-not $wheel) {
            Write-Host "ERROR: No wheel found in wheelhouse/" -ForegroundColor Red
            exit 1
          }

          Write-Host "Testing wheel: $($wheel.Name)"

          # Install the wheel
          python -m pip install $wheel.FullName --force-reinstall

          # Test import and version
          Write-Host "Testing pycolmap import..."
          python -c "import pycolmap; print(f'pycolmap version: {pycolmap.__version__}')"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: pycolmap import failed" -ForegroundColor Red
            exit 1
          }
          Write-Host "pycolmap smoke test passed" -ForegroundColor Green

      - name: Smoke test pycolmap wheel (Linux)
        if: runner.os == 'Linux'
        working-directory: third_party/colmap-for-pycolmap
        run: |
          WHEEL=$(ls wheelhouse/pycolmap-*.whl | head -n 1)

          if [ -z "$WHEEL" ]; then
            echo "ERROR: No wheel found in wheelhouse/"
            exit 1
          fi

          echo "Testing wheel: $WHEEL"

          # Install the wheel
          pip install "$WHEEL" --force-reinstall

          # Test import and version
          echo "Testing pycolmap import..."
          python -c "import pycolmap; print(f'pycolmap version: {pycolmap.__version__}')"

          if [ $? -ne 0 ]; then
            echo "ERROR: pycolmap import failed"
            exit 1
          fi
          echo "pycolmap smoke test passed"

      # ==================== Artifacts ====================
      - name: Rename wheels with variant suffix
        shell: bash
        working-directory: third_party/colmap-for-pycolmap
        run: |
          # Determine variant suffix for wheel filename
          CUDA_MAJOR=$(echo "${{ matrix.cuda_version }}" | cut -d. -f1)
          CUDA_MINOR=$(echo "${{ matrix.cuda_version }}" | cut -d. -f2)
          if [ "${{ matrix.bundle_cuda }}" = "true" ] && [ "${{ matrix.cudss }}" = "true" ]; then
            VARIANT="+cu${CUDA_MAJOR}${CUDA_MINOR}.bundled.cudss"
          elif [ "${{ matrix.bundle_cuda }}" = "true" ]; then
            VARIANT="+cu${CUDA_MAJOR}${CUDA_MINOR}.bundled"
          elif [ "${{ matrix.cudss }}" = "true" ]; then
            VARIANT="+cuda.cudss"
          elif [ "${{ matrix.cuda }}" = "true" ] && [ "$CUDA_MAJOR" != "12" ]; then
            VARIANT="+cu${CUDA_MAJOR}${CUDA_MINOR}"
          elif [ "${{ matrix.cuda }}" = "true" ]; then
            VARIANT="+cuda"
          else
            VARIANT="+cpu"
          fi

          echo "Renaming wheels with variant: $VARIANT"

          # Rename each wheel to include variant in version
          # e.g., pycolmap-4.0.2-cp310-cp310-win_amd64.whl
          #    -> pycolmap-4.0.2+cuda-cp310-cp310-win_amd64.whl
          for wheel in wheelhouse/*.whl; do
            if [ -f "$wheel" ]; then
              filename=$(basename "$wheel")
              # Extract parts: name-version-pytag-abitag-platform.whl
              # Insert variant after version (before first -cp)
              # Matches both release versions (4.0.2) and dev versions (4.0.2.dev0)
              newname=$(echo "$filename" | sed "s/\(pycolmap-[0-9][^-]*\)\(-cp\)/\1${VARIANT}\2/")
              if [ "$filename" != "$newname" ]; then
                echo "  $filename -> $newname"
                mv "$wheel" "wheelhouse/$newname"
              fi
            fi
          done

          echo "Renamed wheels:"
          ls -la wheelhouse/*.whl || echo "No wheels found"

      - name: Prepare artifact name
        id: artifact-name
        shell: bash
        run: |
          CUDA_MAJOR=$(echo "${{ matrix.cuda_version }}" | cut -d. -f1)
          CUDA_MINOR=$(echo "${{ matrix.cuda_version }}" | cut -d. -f2)
          if [ "${{ matrix.bundle_cuda }}" = "true" ] && [ "${{ matrix.cudss }}" = "true" ]; then
            CUDA_SUFFIX="cu${CUDA_MAJOR}${CUDA_MINOR}-bundled-cuDSS"
          elif [ "${{ matrix.bundle_cuda }}" = "true" ]; then
            CUDA_SUFFIX="cu${CUDA_MAJOR}${CUDA_MINOR}-bundled"
          elif [ "${{ matrix.cudss }}" = "true" ]; then
            CUDA_SUFFIX="CUDA-cuDSS"
          elif [ "${{ matrix.cuda }}" = "true" ] && [ "$CUDA_MAJOR" != "12" ]; then
            CUDA_SUFFIX="cu${CUDA_MAJOR}${CUDA_MINOR}"
          elif [ "${{ matrix.cuda }}" = "true" ]; then
            CUDA_SUFFIX="CUDA"
          else
            CUDA_SUFFIX="CPU"
          fi
          PYVER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          echo "name=pycolmap-py${PYVER}-${{ matrix.os }}-${CUDA_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: third_party/colmap-for-pycolmap/wheelhouse/*.whl
          retention-days: 7
          if-no-files-found: error
