name: Release

on:
  push:
    tags:
      - 'v*'  # Auto-release on version tags
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v4.0.2)'
        required: true
        type: string

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==================== Prepare Release ====================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release view "$TAG" --repo "${{ github.repository }}" 2>/dev/null \
            && echo "Release $TAG already exists" \
            || gh release create "$TAG" --repo "${{ github.repository }}" \
                 --title "COLMAP Build $TAG" --draft \
                 --notes "Build in progress..."
          echo "Draft release ready: $TAG"

  # ==================== Build Jobs ====================
  # Each job uploads directly to the draft release — no artifacts needed.
  build-colmap:
    name: Build COLMAP
    needs: prepare
    uses: ./.github/workflows/build-colmap.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  build-pycolmap:
    name: Build pycolmap
    needs: prepare
    uses: ./.github/workflows/build-pycolmap.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  # ==================== Finalize Release ====================
  finalize:
    name: Finalize Release
    needs: [prepare, build-colmap, build-pycolmap]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          mkdir -p /tmp/checksum_work

          echo "# SHA256 Checksums" > SHA256SUMS.txt
          echo "# Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt

          gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' | sort | while read -r ASSET; do
            [ -z "$ASSET" ] && continue
            echo "Checksumming: $ASSET"
            gh release download "$TAG" --repo "${{ github.repository }}" -p "$ASSET" -D /tmp/checksum_work 2>/dev/null || continue
            (cd /tmp/checksum_work && sha256sum "$ASSET") >> SHA256SUMS.txt
            rm -f "/tmp/checksum_work/$ASSET"
          done

          cat SHA256SUMS.txt
          gh release upload "$TAG" --repo "${{ github.repository }}" SHA256SUMS.txt --clobber

      - name: Release summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          COLMAP_RESULT="${{ needs.build-colmap.result }}"
          PYCOLMAP_RESULT="${{ needs.build-pycolmap.result }}"
          ASSET_COUNT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets | length')

          echo "## Release $TAG Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Build COLMAP: **$COLMAP_RESULT**" >> $GITHUB_STEP_SUMMARY
          echo "- Build pycolmap: **$PYCOLMAP_RESULT**" >> $GITHUB_STEP_SUMMARY
          echo "- Release assets: **$ASSET_COUNT**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$COLMAP_RESULT" = "success" ] && [ "$PYCOLMAP_RESULT" = "success" ]; then
            echo "All builds succeeded. Release is ready to publish." >> $GITHUB_STEP_SUMMARY
          else
            echo "Some builds failed. Review before publishing." >> $GITHUB_STEP_SUMMARY
          fi

          gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[] | "- `\(.name)` (\(.size / 1048576 | floor)MB)"' >> $GITHUB_STEP_SUMMARY
